<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence — Session Aktif</title>
<link rel="stylesheet" href="style.css">
<style>
  .admin-badge { display:inline-flex;align-items:center;gap:5px;background:rgba(232,64,64,0.1);border:0.5px solid rgba(232,64,64,0.25);color:#e84040;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600; }
  .action-btn { display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;border:0.5px solid;transition:background 0.15s; }
  .action-btn.revoke { background:var(--red-dim);color:var(--red);border-color:rgba(232,64,64,0.3); }
  .action-btn.revoke:hover { background:rgba(232,64,64,0.2); }
  .modal-wrap { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;padding:20px; }
  .modal-wrap.show { display:flex; }
  .modal-inner { background:var(--navy-soft);border:0.5px solid var(--border-md);border-radius:14px;padding:24px 22px;width:100%;max-width:340px;text-align:center; }
  .modal-hd  { font-size:15px;font-weight:600;color:var(--text-1);margin-bottom:8px; }
  .modal-sub { font-size:12px;color:var(--text-3);margin-bottom:20px;line-height:1.7; }
  .pulse { display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .device-icon { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
  .current-tag { background:var(--green-dim);color:var(--green);font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;border:0.5px solid rgba(45,184,122,0.3); }
</style>
</head>
<body>
<div class="layout" id="app"></div>
<script src="sidebar.js"></script>
<script>
const sessions = [
  { id:1,  user:'Bu Sari Utami',      role:'Administrator', ip:'192.168.1.12',  ua:'Chrome 124 / Windows 11',   login:'07:12',  last:'09:45', device:'desktop', current:true  },
  { id:2,  user:'Bu Sari Utami',      role:'Administrator', ip:'192.168.1.45',  ua:'Safari / iPhone 15',         login:'07:30',  last:'08:20', device:'mobile',  current:false },
  { id:3,  user:'Bpk. Ahmad Fauzi',   role:'User',          ip:'192.168.1.21',  ua:'Firefox 125 / Windows 10',  login:'08:05',  last:'09:10', device:'desktop', current:false },
  { id:4,  user:'Ibu Ratna Dewi',     role:'User',          ip:'192.168.1.33',  ua:'Chrome 124 / Android 14',   login:'08:15',  last:'09:50', device:'mobile',  current:false },
  { id:5,  user:'Bpk. Hendra Wibowo', role:'User',          ip:'192.168.1.67',  ua:'Edge 124 / Windows 11',     login:'09:00',  last:'09:48', device:'desktop', current:false },
  { id:6,  user:'Ibu Lina Kusumawati',role:'User',          ip:'192.168.1.88',  ua:'Chrome 124 / MacOS Sonoma', login:'09:22',  last:'09:30', device:'desktop', current:false },
];

function deviceIcon(type) {
  if (type === 'mobile') return { icon:'📱', bg:'rgba(79,163,232,0.12)' };
  return { icon:'🖥️', bg:'rgba(45,184,122,0.12)' };
}

function buildRows(data) {
  return data.map(s => {
    const d = deviceIcon(s.device);
    return `
    <tr style="${s.current?'background:rgba(45,184,122,0.04)':''}">
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="device-icon" style="background:${d.bg};font-size:14px">${d.icon}</div>
          <div>
            <div style="font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px">
              ${s.user}
              ${s.current ? '<span class="current-tag">Sesi ini</span>' : ''}
            </div>
            <div style="font-size:10px;color:var(--text-3)">${s.ua}</div>
          </div>
        </div>
      </td>
      <td>
        <span class="badge ${s.role==='Administrator'?'badge-red':'badge-blue'}">${s.role}</span>
      </td>
      <td style="font-size:11px;color:var(--text-2);font-family:monospace">${s.ip}</td>
      <td>
        <div style="font-size:11px;color:var(--text-2)">Login ${s.login}</div>
        <div style="font-size:10px;color:var(--text-3)">Aktif ${s.last}</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="pulse"></span>
          <span style="font-size:11px;color:var(--green)">Online</span>
        </div>
      </td>
      <td>
        ${s.current
          ? '<span style="font-size:11px;color:var(--text-3)">Sesi aktif</span>'
          : `<span class="action-btn revoke" onclick="openRevoke('${s.user}', ${s.id})">Revoke</span>`
        }
      </td>
    </tr>`;
  }).join('');
}

document.getElementById('app').innerHTML = `
${renderSidebar('admin-session')}
<div class="main">
  ${renderTopbar('Manajemen Session Aktif', 'Admin — pantau & kelola sesi login')}
  <div class="page-content">

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
      <div class="admin-badge">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a3 3 0 1 1 0 6A3 3 0 0 1 8 1zm0 8c-3.3 0-6 1.3-6 3v1h12v-1c0-1.7-2.7-3-6-3z"/></svg>
        ADMIN
      </div>
      <span style="font-size:12px;color:var(--text-3)">Halaman ini hanya dapat diakses oleh Administrator</span>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
      <div class="stat-card t-green">
        <div class="stat-label">Session Aktif</div>
        <div class="stat-value" style="display:flex;align-items:center;gap:8px">
          ${sessions.length}
          <span class="pulse"></span>
        </div>
        <div class="stat-sub">Saat ini online</div>
      </div>
      <div class="stat-card t-blue">
        <div class="stat-label">Pengguna Unik</div>
        <div class="stat-value">${[...new Set(sessions.map(s=>s.user))].length}</div>
        <div class="stat-sub">Login hari ini</div>
      </div>
      <div class="stat-card t-orange">
        <div class="stat-label">Perangkat Mobile</div>
        <div class="stat-value">${sessions.filter(s=>s.device==='mobile').length}</div>
        <div class="stat-sub">Dari smartphone</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-head" style="flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="panel-icon" style="background:#2db87a">◎</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text-1)">Session Aktif</div>
            <div style="font-size:10px;color:var(--text-3)">Diperbarui otomatis tiap 30 detik</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input class="filter-select" type="text" placeholder="Cari pengguna / IP..." style="min-width:180px" oninput="filterSession(this.value)">
          <select class="filter-select" onchange="filterRole(this.value)">
            <option value="">Semua Role</option>
            <option>Administrator</option>
            <option>User</option>
          </select>
          <button class="action-btn revoke" style="padding:7px 12px" onclick="openRevokeAll()">Revoke Semua</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Pengguna</th>
              <th>Role</th>
              <th>IP Address</th>
              <th>Waktu</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="sessionBody">${buildRows(sessions)}</tbody>
        </table>
      </div>

      <div style="margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-size:11px;color:var(--text-3)">${sessions.length} sesi aktif ditampilkan</span>
        <div style="display:flex;gap:8px">
          <span style="font-size:11px;color:var(--text-3);align-self:center" id="lastRefresh">Terakhir diperbarui: 09:51:22</span>
          <button class="btn-export" onclick="refreshSessions()">↻ Refresh</button>
        </div>
      </div>
    </div>

    <!-- Log aktivitas -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Log aktivitas login hari ini</span>
        <a href="#" class="card-link" onclick="alert('Ekspor log...')">↓ Ekspor →</a>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Bu Sari Utami <span style="color:var(--text-3);font-weight:400">— Administrator</span></div><div class="ri-time">Login · 07:12 · 192.168.1.12 · Chrome/Windows</div></div>
        <span class="badge badge-green">Login</span>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Bu Sari Utami <span style="color:var(--text-3);font-weight:400">— Administrator</span></div><div class="ri-time">Login · 07:30 · 192.168.1.45 · Safari/iPhone</div></div>
        <span class="badge badge-green">Login</span>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Bpk. Ahmad Fauzi <span style="color:var(--text-3);font-weight:400">— User</span></div><div class="ri-time">Login · 08:05 · 192.168.1.21 · Firefox/Windows</div></div>
        <span class="badge badge-green">Login</span>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Ibu Ratna Dewi <span style="color:var(--text-3);font-weight:400">— User</span></div><div class="ri-time">Login · 08:15 · 192.168.1.33 · Chrome/Android</div></div>
        <span class="badge badge-green">Login</span>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Pengguna tidak dikenal <span style="color:var(--text-3);font-weight:400">— ?</span></div><div class="ri-time">Gagal login · 08:42 · 10.0.0.5 · Password salah 3x</div></div>
        <span class="badge badge-red">Gagal</span>
      </div>
      <div class="recent-item">
        <div><div class="ri-name">Bpk. Hendra Wibowo <span style="color:var(--text-3);font-weight:400">— User</span></div><div class="ri-time">Login · 09:00 · 192.168.1.67 · Edge/Windows</div></div>
        <span class="badge badge-green">Login</span>
      </div>
    </div>

  </div>
</div>

<!-- Modal revoke satu -->
<div class="modal-wrap" id="revokeModal">
  <div class="modal-inner">
    <div style="width:44px;height:44px;background:var(--red-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e84040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div class="modal-hd">Revoke Session?</div>
    <div class="modal-sub" id="revokeMsg">Pengguna akan dikeluarkan dari sesi ini dan harus login ulang.</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('revokeModal').classList.remove('show')">Batal</button>
      <button class="btn" style="flex:1;background:var(--red);color:#fff" onclick="doRevoke()">Ya, Revoke</button>
    </div>
  </div>
</div>

<!-- Modal revoke semua -->
<div class="modal-wrap" id="revokeAllModal">
  <div class="modal-inner">
    <div style="width:44px;height:44px;background:var(--red-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e84040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="modal-hd">Revoke Semua Session?</div>
    <div class="modal-sub">Semua pengguna (kecuali Anda) akan dikeluarkan dan harus login ulang. Tindakan ini tidak dapat dibatalkan.</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('revokeAllModal').classList.remove('show')">Batal</button>
      <button class="btn" style="flex:1;background:var(--red);color:#fff" onclick="alert('Semua session berhasil di-revoke!');document.getElementById('revokeAllModal').classList.remove('show')">Revoke Semua</button>
    </div>
  </div>
</div>`;

initSidebar();

function openRevoke(name, id) {
  document.getElementById('revokeMsg').textContent = `Sesi milik "${name}" akan diakhiri. Pengguna harus login ulang.`;
  document.getElementById('revokeModal').classList.add('show');
}
function openRevokeAll() {
  document.getElementById('revokeAllModal').classList.add('show');
}
function doRevoke() {
  alert('Session berhasil di-revoke!');
  document.getElementById('revokeModal').classList.remove('show');
}
function filterSession(q) {
  document.querySelectorAll('#sessionBody tr').forEach(r=>{
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}
function filterRole(v) {
  document.querySelectorAll('#sessionBody tr').forEach(r=>{
    r.style.display = !v || r.textContent.includes(v) ? '' : 'none';
  });
}
function refreshSessions() {
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  document.getElementById('lastRefresh').textContent = 'Terakhir diperbarui: ' + t;
  alert('Data session diperbarui!');
}
</script>
</body>
</html>
