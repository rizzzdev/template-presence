<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence — About Developer</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ── Hero ── */
  .about-hero {
    background: linear-gradient(135deg, rgba(255,140,0,0.1) 0%, rgba(26,111,196,0.08) 100%);
    border: 0.5px solid var(--border-md);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .about-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,140,0,0.06);
  }
  .about-hero::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(26,111,196,0.06);
  }
  .app-logo-big {
    width: 64px; height: 64px;
    background: var(--orange); border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #fff;
    margin-bottom: 14px; position: relative; z-index: 1;
  }
  .app-name  { font-size: 22px; font-weight: 700; color: var(--text-1); position: relative; z-index: 1; }
  .app-desc  { font-size: 12px; color: var(--text-3); margin-top: 6px; line-height: 1.7; max-width: 400px; margin-left: auto; margin-right: auto; position: relative; z-index: 1; }
  .app-version {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange-dim); border: 0.5px solid var(--orange-bdr);
    color: var(--orange); font-size: 11px; padding: 4px 12px;
    border-radius: 20px; font-weight: 500; margin-top: 12px;
    position: relative; z-index: 1;
  }

  /* ── Dev Grid ── */
  .dev-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  /* ── Dev Card ── */
  .dev-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border-md);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .dev-card:hover {
    border-color: rgba(255,140,0,0.35);
    background: rgba(255,140,0,0.04);
  }
  .dev-card.lead {
    border-color: rgba(255,140,0,0.3);
    background: rgba(255,140,0,0.05);
  }
  .dev-card.lead::before {
    content: 'Lead';
    position: absolute; top: 12px; right: 12px;
    background: var(--orange-dim); color: var(--orange);
    font-size: 9px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; border: 0.5px solid var(--orange-bdr);
  }

  /* ── Photo ── */
  .dev-photo-wrap {
    position: relative;
    width: 84px; height: 84px;
    margin: 0 auto 14px;
  }
  .dev-photo {
    width: 84px; height: 84px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid var(--border-md);
    display: block;
  }
  .dev-photo-placeholder {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 2.5px solid var(--border-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700;
    background: var(--navy-soft);
  }
  .dev-card.lead .dev-photo-placeholder { border-color: var(--orange); }
  .dev-online {
    position: absolute; bottom: 3px; right: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--navy-mid);
  }

  .dev-name   { font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 3px; }
  .dev-role   { font-size: 11px; color: var(--orange); font-weight: 500; margin-bottom: 8px; }
  .dev-nim    { font-size: 10px; color: var(--text-3); margin-bottom: 12px; }
  .dev-tags   { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 14px; }
  .dev-tag    { font-size: 9px; padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.06); color: var(--text-3); border: 0.5px solid var(--border); }

  .dev-links  { display: flex; justify-content: center; gap: 8px; }
  .dev-link {
    width: 30px; height: 30px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: 0.5px solid var(--border-md);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: var(--text-3);
    font-size: 13px; transition: background 0.15s, color 0.15s;
  }
  .dev-link:hover { background: var(--orange-dim); color: var(--orange); border-color: var(--orange-bdr); }

  /* ── Tech Stack ── */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .tech-item {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border-md);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .tech-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .tech-name { font-size: 12px; font-weight: 500; color: var(--text-1); }
  .tech-desc { font-size: 10px; color: var(--text-3); margin-top: 1px; }

  /* ── Responsive ── */
  @media (min-width: 640px) {
    .dev-grid    { grid-template-columns: repeat(2, 1fr); }
    .tech-grid   { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .dev-grid    { grid-template-columns: repeat(4, 1fr); }
    .tech-grid   { grid-template-columns: repeat(4, 1fr); }
    .dev-photo-wrap { width: 88px; height: 88px; }
    .dev-photo, .dev-photo-placeholder { width: 88px; height: 88px; }
    .dev-photo-placeholder { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="layout" id="app"></div>
<script src="sidebar.js"></script>
<script>

      </a>
      <a class="dev-link" href="${dev.instagram}" title="Instagram">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
      </a>

  </div>`;
}

function techCard(t) {
  return `
  <div class="tech-item">
    <div class="tech-icon" style="background:${t.bg}">${t.icon}</div>
    <div>
      <div class="tech-name">${t.name}</div>
      <div class="tech-desc">${t.desc}</div>

}

document.getElementById('app').innerHTML = `
${renderSidebar('about')}
